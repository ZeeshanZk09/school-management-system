# Project identification
sonar.projectKey=school-management-system
sonar.projectName=School Management System
sonar.projectVersion=1.0.0

# Path to source and test directories
sonar.sources=src
sonar.tests=src

# Inclusions and exclusions
sonar.exclusions=node_modules/**, .next/**, src/lib/generated/prisma/**, dist/**, build/**, coverage/**
sonar.test.inclusions=**/*.test.ts, **/*.test.tsx, **/src/app/(dashboard)/**/__tests__/**, **/src/lib/auth/__tests__/**

# Language and runtime configurations
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.tsconfigPath=tsconfig.json
sonar.sourceEncoding=UTF-8
